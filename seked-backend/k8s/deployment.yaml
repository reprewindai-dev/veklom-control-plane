apiVersion: apps/v1
kind: Deployment
metadata:
  name: seked-control-plane
  labels:
    app: seked-control-plane
    version: v1.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: seked-control-plane
  template:
    metadata:
      labels:
        app: seked-control-plane
        version: v1.0
    spec:
      containers:
      - name: seked-backend
        image: seked/control-plane:latest
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: seked-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: seked-secrets
              key: jwt-secret
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: seked-control-plane-service
spec:
  selector:
    app: seked-control-plane
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3001
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seked-control-plane-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "15m"
spec:
  tls:
  - hosts:
    - seked.veklom.com
    secretName: seked-tls
  rules:
  - host: seked.veklom.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: seked-control-plane-service
            port:
              number: 80
